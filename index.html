<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Skizzen — Daniel Arnold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #F4EFE3; color: #1E1A14;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    max-width: 600px; margin: 0 auto;
    padding: 96px 32px 64px;
  }
  .preamble {
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #847C6E;
    margin-bottom: 24px; display: flex; align-items: center; gap: 14px;
  }
  .preamble::before {
    content: ''; width: 24px; height: 1px; background: #847C6E;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 44px; line-height: 1.1;
    letter-spacing: -0.02em; margin-bottom: 24px;
  }
  h1 em { font-style: italic; font-weight: 300; color: #B85735; }
  .lede {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: 17px; line-height: 1.55; color: #4A4339;
    margin-bottom: 48px;
  }
  ul {
    list-style: none; padding: 0;
    border-top: 1px solid #D9D0B9;
  }
  li {
    border-bottom: 1px solid #D9D0B9;
    padding: 18px 0;
  }
  li a {
    color: #1E1A14; text-decoration: none;
    font-size: 14px;
  }
  li a:hover { color: #B85735; }
  li .meta {
    display: block;
    font-size: 11px; color: #847C6E;
    margin-top: 4px;
  }
  .empty {
    color: #847C6E; font-style: italic;
    font-family: 'Fraunces', serif; font-size: 16px;
    padding: 24px 0;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="preamble">Sandkasten · Daniel Arnold</div>
  <h1>Skizzen<br><em>im Werden</em></h1>
  <p class="lede">
    Hier liegen Mockups und Konzeptseiten. Nichts hier ist Produkt, nichts ist Pitch.
    Wenn du den Link bekommen hast, gehörst du zu der kleinen Runde, die mitschauen darf.
  </p>
  <ul>
    <li class="empty">— noch leer, neue Skizzen folgen —</li>
  </ul>
</div>
</body>
</html>
